services:

  mongodb:
    image: mongo:latest
    container_name: school_mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  backend:
    build: ./backend
    container_name: school_backend
    ports:
      - "8000:8000"
    depends_on:
      - mongodb
    environment:
      - MONGO_URL=mongodb://mongodb:27017

  frontend:
    build: ./frontend
    container_name: school_frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  mongo_data: